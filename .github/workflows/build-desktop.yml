name: Build Desktop App

on:
  push:
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-desktop.yml"
      - "package.json"
      - "package-lock.json"
      - "astro.config.mjs"
      - "tsconfig.json"
      - "src/**"
      - "public/**"
      - "src-tauri/**"
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      BACKEND_REPO: ${{ vars.BACKEND_REPO }}
      BACKEND_WORKFLOW: ${{ vars.BACKEND_WORKFLOW }}
      BACKEND_ARTIFACT_NAME: ${{ vars.BACKEND_ARTIFACT_NAME }}

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Get latest backend run
        id: get_run
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const backendRepo = process.env.BACKEND_REPO;
            if (!backendRepo || !backendRepo.includes('/')) {
              core.setFailed('Missing BACKEND_REPO. Define repository variable BACKEND_REPO as "owner/repo".');
              return;
            }

            const [owner, repo] = backendRepo.split('/');
            const workflow_id = process.env.BACKEND_WORKFLOW || 'build-backend.yml';

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              status: 'success',
              per_page: 1,
            });

            const latest = runs.data.workflow_runs?.[0];
            if (!latest?.id) {
              core.setFailed(`No successful runs found for ${backendRepo} workflow ${workflow_id}.`);
              return;
            }

            core.setOutput('run_id', String(latest.id));

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BACKEND_ARTIFACT_NAME || 'backend' }}
          repository: ${{ env.BACKEND_REPO }}
          run-id: ${{ steps.get_run.outputs.run_id }}
          github-token: ${{ secrets.GH_PAT }}
          path: src-tauri/bin/backend

      - name: Build desktop app (Tauri)
        run: npm run tauri -- build --bundles nsis

      - name: Upload desktop bundle (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundle
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Publish bundle to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
